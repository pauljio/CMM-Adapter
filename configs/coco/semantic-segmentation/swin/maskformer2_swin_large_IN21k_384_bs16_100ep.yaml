_BASE_: ../maskformer2_R50_bs16_50ep.yaml
MODEL:
  BACKBONE:
    NAME: "D2SwinTransformer"
  SWIN:
    EMBED_DIM: 192
    DEPTHS: [2, 2, 18, 2]
    NUM_HEADS: [6, 12, 24, 48]
    WINDOW_SIZE: 12
    APE: False
    DROP_PATH_RATE: 0.3
    PATCH_NORM: True
    PRETRAIN_IMG_SIZE: 384
    ADAPTER_DIM: 48  # 4x reduction
  WEIGHTS: "swin_large_patch4_window12_384_22k.pkl"
  MASK_FORMER:
    NUM_OBJECT_QUERIES: 200

SOLVER:
  IMS_PER_BATCH: 4  # batch size
  BASE_LR: 0.0001
  MAX_ITER: 40000  # epoch: 100(bs=4)
  CHECKPOINT_PERIOD: 8000  # every 20 epoch(bs=4)
  WARMUP_FACTOR: 1.0
  WARMUP_ITERS: 0
  WEIGHT_DECAY: 0.05
TEST:
  EVAL_PERIOD: 4000  # every 10 epoch(bs=4)

FINE_TUNING:
  ENABLE: True
  FREEZE_AT: 0  # General freezing stage, not used yet
  BACKBONE:
    NAME: "Swin"
    ADAPTER: True  # unfreeze backbone shared_adapter_attn / shared_adapter_ffn params
  SEM_SEG_HEAD:
    PIXEL_DECODER:
      ADAPTER: True
    PREDICTOR:
      ADAPTER: True

OUTPUT_DIR: "output/coco/maskformer2_swin_large_IN21k_384_bs16_100ep"
