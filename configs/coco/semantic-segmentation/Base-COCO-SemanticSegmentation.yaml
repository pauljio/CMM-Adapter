  RESNETS:
    DEPTH: 50
    STEM_TYPE: "basic"  # not used
    STEM_OUT_CHANNELS: 64
    STRIDE_IN_1X1: False
    OUT_FEATURES: ["res2", "res3", "res4", "res5"]
    NORM: "BN"
    RES5_MULTI_GRID: [1, 1, 1]  # not used
DATASETS:
  DATASET_ROOT: "/data1/cjp/Datasets"  # root dir of all datasets
  MODAL: "RGB-T"
  TRAIN: ("MFNetDataset_train",)
  TEST: ("MFNetDataset_val",)
  # MODAL: "RGB-T"
  # TRAIN: ("PST900_train",)
  # TEST: ("PST900_test",)
  # MODAL: "RGB-D"
  # TRAIN: ("NYU_Depth_V2_train",)
  # TEST: ("NYU_Depth_V2_test",)
  # MODAL: "RGB-D"
  # TRAIN: ("SUN-RGBD_train",)
  # TEST: ("SUN-RGBD_test",)
  # MODAL: "RGB-D"
  # TRAIN: ("Cityscapes_train",)
  # TEST: ("Cityscapes_val",)
  # MODAL: "RGB-P"
  # TRAIN: ("ZJU-RGB-P_train",)
  # TEST: ("ZJU-RGB-P_val",)
  # MODAL: "RGB-E"
  # TRAIN: ("EventScape_train",)
  # TEST: ("EventScape_val",)
  # MODAL: "RGB-D"
  # TRAIN: ("DELIVER_train",)
  # TEST: ("DELIVER_val",)

SOLVER:
  IMS_PER_BATCH: 8  # batch size
  BASE_LR: 0.00005
  MAX_ITER: 20000  # epoch: 100(bs=8)
  CHECKPOINT_PERIOD: 4000  # every 20 epoch(bs=8)
  WARMUP_FACTOR: 1.0
  WARMUP_ITERS: 1000
  WEIGHT_DECAY: 0.01
  OPTIMIZER: "ADAMW"
  LR_SCHEDULER_NAME: "WarmupPolyLR"  # "WarmupCosineLR"
  BACKBONE_MULTIPLIER: 0.1
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 0.01
    NORM_TYPE: 2.0
  AMP:
    ENABLED: True

INPUT:
  AUG_ENABLED: True
  CROP:
    ENABLED: True
    # H * W
    SIZE: (480, 640)  # MFNet
    # SIZE: (720, 1280)  # PST900
    # SIZE: (480, 640)  # NYU_Depth_V2
    # SIZE: (480, 480)  # SUN-RGBD
    # SIZE: (512, 612)  # ZJU-RGB-P
    # SIZE: (1024, 1024)  # DELIVER
  COLOR_AUG_SSD: False
  FLIP: True
  SIZE_DIVISIBILITY: -1
#  FORMAT: "RGB"
  DATASET_MAPPER_NAME: "mask_former_semantic"

TEST:
  EVAL_PERIOD: 2000  # every 10 epoch(bs=8)
  # Flat TEST config below is supported by the custom RGB-X TTA path.
  # Standard Detectron2 TEST.AUG.* configs are also supported.
  AUG_ENABLED: False
  RESIZE:
    ENABLED: True
    SCALE: [0.5, 0.75, 1.0, 1.25, 1.5, 1.75]
  FLIP: True

DATALOADER:
  FILTER_EMPTY_ANNOTATIONS: True
  NUM_WORKERS: 8
VERSION: 2
